name: Snap Publish

on:
  workflow_run:
    workflows: ["Python Publish"]
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Copy snapcraft.yaml to root
        run: cp packaging/snap/snapcraft.yaml snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        with:
          snapcraft-args: --destructive-mode

      - name: Publish snap
        uses: snapcore/action-publish@v1
        with:
          snap: "*.snap"
          release: stable
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
